<div class="app-container">
  <header class="header">
    <h1>{{ title }}</h1>
    <p class="subtitle">Personalized AI Interview Preparation & Feedback</p>
  </header>

  <div class="main-content">
    <div class="controls-panel">
      <div class="control-group">
        <label for="domain">Domain:</label>
        <input
          id="domain"
          [(ngModel)]="selectedDomain"
          class="control-select"
          list="domain-options"
          placeholder="Type or search domain" />
        <datalist id="domain-options">
          <option *ngFor="let domain of domains" [value]="domain"></option>
        </datalist>
      </div>

      <div class="control-group">
        <label for="difficultyType">Difficulty Type:</label>
        <select
          id="difficultyType"
          [(ngModel)]="selectedDifficultyMode"
          (change)="onDifficultyModeChange()"
          class="control-select">
          <option value="technical">Easy / Medium / Hard</option>
          <option value="learning">Beginner / Intermediate / Advanced</option>
        </select>
      </div>

      <div class="control-group">
        <label for="difficulty">Difficulty:</label>
        <input
          id="difficulty"
          [(ngModel)]="selectedDifficulty"
          class="control-select"
          list="difficulty-options"
          [placeholder]="difficultyPlaceholder" />
        <datalist id="difficulty-options">
          <option *ngFor="let difficulty of currentDifficultyOptions" [value]="difficulty"></option>
        </datalist>
      </div>

      <button class="reset-btn" (click)="resetChat()">Reset Chat</button>
    </div>

    <div class="chat-container">
      <div class="chat-messages">
        <div *ngFor="let message of messages" 
             class="message" 
             [ngClass]="{'user-message': message.sender === 'user', 'ai-message': message.sender === 'ai'}">
          <div class="message-header">
            <span class="message-sender">{{ message.sender === 'user' ? 'You' : 'SmartKoach' }}</span>
            <span class="message-time">{{ message.timestamp | date:'short' }}</span>
          </div>
          <div class="message-text">{{ message.text }}</div>
        </div>
        
        <div *ngIf="isLoading" class="message ai-message loading-message">
          <div class="message-header">
            <span class="message-sender">SmartKoach</span>
          </div>
          <div class="message-text">Thinking...</div>
        </div>
      </div>

      <div class="chat-input-container">
        <textarea 
          [(ngModel)]="userMessage" 
          (keypress)="onKeyPress($event)"
          placeholder="Type your answer or question here..."
          class="chat-input"
          rows="3"
          [disabled]="isLoading"></textarea>
        <button 
          (click)="sendMessage()" 
          [disabled]="!userMessage.trim() || isLoading"
          class="send-btn">
          Send
        </button>
      </div>
    </div>
  </div>
</div>
